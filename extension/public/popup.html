<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Ankicode</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        width: 280px;
        padding: 16px;
        background: linear-gradient(160deg, #f3f7f4 0%, #e7efe9 100%);
        color: #163227;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 1.1rem;
      }
      p {
        margin: 0 0 12px;
        font-size: 0.85rem;
        color: #3d5a4c;
      }
      label {
        display: grid;
        gap: 6px;
        font-size: 0.8rem;
        margin-bottom: 12px;
      }
      input {
        padding: 8px 10px;
        border: 1px solid #9bb5a6;
        border-radius: 6px;
        font: inherit;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .actions {
        display: flex;
        gap: 8px;
      }
      button {
        flex: 1;
        border: 0;
        border-radius: 6px;
        padding: 8px 10px;
        font: 600 0.85rem/1.2 inherit;
        cursor: pointer;
      }
      #pair {
        background: #1f6f4a;
        color: #fff;
      }
      #unpair {
        background: #d9e6de;
        color: #163227;
      }
      #status {
        margin-top: 12px;
        margin-bottom: 0;
        min-height: 2.4em;
      }
    </style>
  </head>
  <body>
    <h1>Ankicode</h1>
    <p>Pair with the local desktop app using the code from Settings.</p>
    <label>
      Pairing code
      <input
        id="pairing-code"
        maxlength="8"
        autocomplete="off"
        spellcheck="false"
      />
    </label>
    <div class="actions">
      <button id="pair" type="button">Pair</button>
      <button id="unpair" type="button">Unpair</button>
    </div>
    <p id="status">Checking status…</p>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
